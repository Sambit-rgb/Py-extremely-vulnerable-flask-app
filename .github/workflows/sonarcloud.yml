name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # Install project dependencies if present
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest pytest-cov coverage

      - name: Run tests and generate coverage report
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            || echo "No tests found, continuing with analysis"

      - name: Fix coverage report paths
        run: |
          if [ -f coverage.xml ]; then
            # Replace absolute paths with relative paths in coverage.xml
            sed -i "s|/home/runner/work/Py-extremely-vulnerable-flask-app/Py-extremely-vulnerable-flask-app|.|g" coverage.xml
          else
            # Create dummy coverage if no tests found
            cat > coverage.xml << 'EOF'
          <?xml version="1.0" ?>
          <coverage version="5.5" timestamp="0" lines-valid="0" lines-covered="0" line-rate="0" branches-covered="0" branch-rate="0" complexity="0">
            <sources>
              <source>.</source>
            </sources>
          </coverage>
          EOF
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Sambit-rgb_Py-extremely-vulnerable-flask-app
            -Dsonar.organization=sambit-rgb
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=.
